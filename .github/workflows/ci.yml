name: CI

on:
  push:
    branches: [main, develop, redesign/fleet-console]
  pull_request:
    branches: [main, develop, redesign/fleet-console]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DO_NOT_TRACK: 1

jobs:
  contract:
    name: contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: packages/contract
        run: bun install

      - name: Run tests
        working-directory: packages/contract
        run: bun test

  hub:
    name: hub
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: agentpod
          POSTGRES_PASSWORD: agentpod-dev-password
          POSTGRES_DB: agentpod
        ports:
          # Map to 5434 — that is the default port integration tests fall back to
          # when DATABASE_URL is not set (broker-gateway, stations, runtimes, etc.)
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # tauri-plugin-mcp is in the workspace but has no postinstall/prepare Rust
      # step; pnpm-workspace.yaml gates build scripts to esbuild only via
      # onlyBuiltDependencies, so --frozen-lockfile is safe without Rust.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        working-directory: apps/hub
        run: bun test
        env:
          NODE_ENV: test
          # Matches the host port mapped above (service container internal 5432 →
          # host 5434) and the integration-test default DATABASE_URL fallback.
          DATABASE_URL: postgres://agentpod:agentpod-dev-password@localhost:5434/agentpod
          API_TOKEN: test-token
          SESSION_SECRET: test-session-secret-32-chars-long
          ENCRYPTION_KEY: test-encryption-key-32-bytes!!!!

  node-agent:
    name: node-agent
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/node-agent/go.mod

      - name: Vet
        working-directory: apps/node-agent
        run: go vet ./...

      - name: Test
        working-directory: apps/node-agent
        run: go test ./... -race

  console:
    name: console
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # Same install caveat as hub: tauri-plugin-mcp build-plugin (Cargo) is not
      # triggered by pnpm install; onlyBuiltDependencies limits lifecycle scripts
      # to esbuild. No Rust toolchain needed.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check (svelte-check)
        working-directory: apps/console
        run: pnpm check

      - name: Run tests
        working-directory: apps/console
        run: pnpm test

      - name: Build
        working-directory: apps/console
        run: pnpm build
