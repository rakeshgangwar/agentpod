name: Release node-agent

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: false

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      # Don't let one arch's transient runner failure cancel the others and skip
      # the dependent SHA256SUMS/static-asset jobs (which produced an incomplete
      # release on v0.1.7, needing a manual `gh run rerun --failed`).
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/node-agent/go.mod

      - name: Build binary
        working-directory: apps/node-agent
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build \
            -trimpath \
            -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" \
            -o agentpod-node-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/agentpod-node

      - name: Upload binary to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.tag }}
          files: apps/node-agent/agentpod-node-${{ matrix.goos }}-${{ matrix.goarch }}

  static-assets:
    name: Upload static release assets
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Upload static assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.tag }}
          files: |
            apps/node-agent/deploy/agentpod-node.service
            apps/node-agent/scripts/install.sh

  sha256sums:
    name: Publish SHA256SUMS
    runs-on: ubuntu-latest
    needs: static-assets

    steps:
      - name: Download all release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name || inputs.tag }}"
          mkdir -p release-assets
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --dir release-assets

      - name: Compute SHA256SUMS
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Upload SHA256SUMS to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.tag }}
          files: release-assets/SHA256SUMS
