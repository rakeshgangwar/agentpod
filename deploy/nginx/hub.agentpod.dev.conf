# AgentPod — nginx vhosts for the hosted hub + console.
#
# Install:  /etc/nginx/sites-available/agentpod-hub  (symlink into sites-enabled)
# Deploy:   see deploy/README-deploy.md  (P3 Task 10)
#
# ADDITIVE ONLY. This file adds two NEW server blocks (hub.agentpod.dev,
# app.agentpod.dev). It MUST NOT modify the existing id.agentpod.dev (Synapse)
# vhost. Always `nginx -t` before reload.
#
# These blocks listen on :80; run certbot afterwards to add the :443 TLS
# listeners and the 80→443 redirect:
#   certbot --nginx -d hub.agentpod.dev -d app.agentpod.dev
# certbot copies the location blocks into the generated :443 server, so the
# proxy + WS config below applies to HTTPS too.

# ── Hub API + gateway/terminal WebSockets ──────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name hub.agentpod.dev;

    # Generous body size for fs.write of large files.
    client_max_body_size 64m;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # WebSocket upgrade — required for the node gateway
        # (/public/nodes/gateway) AND the console terminal
        # (/api/stations/:id/terminal).
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long-lived streams (gateway WS, terminal, SSE log tail): don't time
        # out idle-but-open connections quickly.
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_buffering     off;
    }
}

# ── Console (static SvelteKit adapter-static build) ────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name app.agentpod.dev;

    # Path to the built console (apps/console/build). Adjust if the repo lives
    # elsewhere on the box (see README-deploy.md).
    root /opt/agentpod/apps/console/build;
    index index.html;

    # SPA fallback: adapter-static emits a fallback page (index.html / 200.html).
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# NOTE: the $connection_upgrade map must exist once in the http{} context.
# Debian/Ubuntu's default nginx.conf does NOT define it, so add this to
# /etc/nginx/conf.d/agentpod-upgrade.conf (see README-deploy.md):
#
#   map $http_upgrade $connection_upgrade {
#       default upgrade;
#       ''      close;
#   }
